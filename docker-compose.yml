services:
  mysql:
    image: mysql:8.0
    container_name: ai_platform_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ai_platform
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    ports:
      - "6379:6379"

  minio:
    image: elestio/minio:latest
    container_name: ai_platform_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      platforms:
        - linux/arm64
    platform: linux/arm64
    container_name: ai_platform_backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DB_DSN: root:rootpass@tcp(mysql:3306)/ai_platform?charset=utf8mb4&parseTime=True
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
    dns:                           # ← 新增的 DNS 配置
      - 114.114.114.114
      - 8.8.8.8
    volumes:
      - ./frontend:/root/frontend

  nginx:
    image: nginx:alpine
    container_name: ai_platform_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  minio_data: